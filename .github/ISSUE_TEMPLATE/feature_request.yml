name: "\U0001F680 Feature request"
description: Suggest an idea for this project
labels: ["feature-request"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting an idea to improve the Ad Noctem Collective winkit PowerShell toolkit.
        Please fill in as much of the following form as you are able.
  - type: input
    attributes:
      label: Name and Version
      description: Name and version of the affected script or module
      placeholder: winkit - 1.2.3
    validations:
      required: true
  - type: textarea
    attributes:
      label: What is the problem this feature will solve?
    validations:
      required: true
  - type: textarea
    attributes:
      label: What is the feature you are proposing to solve the problem?
      description: Describe the requests. If you already have something in mind... PRs are welcome!
    validations:
      required: true
  - type: textarea
    attributes:
      label: What alternatives have you considered?
