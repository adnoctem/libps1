name: 🐞 Bug
description: Create a report to help us improve
labels: ["tech-issues"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting an issue. Please fill in as much of the following form as you are able.
  - type: input
    attributes:
      label: Name and Version
      description: Name and version of the affected script or module
      placeholder: winkit - 1.2.3
    validations:
      required: true
  - type: dropdown
    attributes:
      label: What PowerShell version are you using?
      description: The version of PowerShell where the issue occurs
      options:
        - Windows PowerShell 5.1
        - PowerShell 6.x
        - PowerShell 7.x
    validations:
      required: true
  - type: dropdown
    attributes:
      label: What architecture are you using?
      description: Choose the architecture of the host system
      options:
        - amd64
        - arm64
    validations:
      required: true
  - type: textarea
    attributes:
      label: What steps will reproduce the bug?
      description: Enter details about your bug.
      placeholder: |
        1. In this environment...
        2. With this config...
        3. Run '...'
        4. See error...
    validations:
      required: true
  - type: textarea
    attributes:
      label: What is the expected behavior?
      description: If possible please provide textual output instead of screenshots.
  - type: textarea
    attributes:
      label: What do you see instead?
      description: If possible please provide textual output instead of screenshots.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Additional information
      description: Tell us anything else you think we should know.
